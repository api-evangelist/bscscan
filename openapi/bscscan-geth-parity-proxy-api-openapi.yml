openapi: 3.1.0
info:
  title: BscScan Accounts Geth/Parity Proxy API
  version: 1.0.0
  description: BscScan is the leading block explorer and analytics platform for BNB Smart Chain (BSC), providing a REST API for querying transactions, token transfers, smart contract ABIs, gas prices, BEP-20 token information, and on-chain statistics. API subscriptions are unified under the Etherscan V2 platform, enabling access to 60+ EVM chains via a single API key using the chainid parameter (BSC chainid=56).
  license:
    name: UNLICENSED
    url: https://docs.bscscan.com/
servers:
- url: https://api.bscscan.com/v2/api
  description: BscScan BNB Smart Chain Mainnet (Etherscan V2, chainid=56)
- url: https://api-testnet.bscscan.com/api
  description: BscScan BNB Smart Chain Testnet
security:
- apiKeyAuth: []
tags:
- name: Geth/Parity Proxy
paths:
  /?module=proxy&action=eth_blockNumber:
    get:
      operationId: eth_blocknumber
      externalDocs:
        url: https://docs.bscscan.com/api-endpoints/geth-parity-proxy#eth_blocknumber
      summary: eth_blockNumber
      description: Returns the number of most recent block
      tags:
      - Geth/Parity Proxy
      parameters: []
      responses:
        '200':
          description: Operation result.
          content:
            application/json:
              schema:
                oneOf:
                - allOf:
                  - $ref: '#/components/schemas/ProxyResponseOK'
                  - $ref: '#/components/schemas/Result.proxy.eth_blockNumber'
                - $ref: '#/components/schemas/ProxyResponseNOTOK'
              example:
                jsonrpc: '2.0'
                id: 83
                result: '0xc36b29'
  /?module=proxy&action=eth_getBlockByNumber:
    get:
      operationId: eth_getblockbynumber
      externalDocs:
        url: https://docs.bscscan.com/api-endpoints/geth-parity-proxy#eth_getblockbynumber
      summary: eth_getBlockByNumber
      description: Returns information about a block by block number.
      tags:
      - Geth/Parity Proxy
      parameters:
      - in: query
        name: tag
        schema:
          $ref: '#/components/schemas/Hex0xPrefixed'
        required: true
        example: '0x10d4f'
      - in: query
        name: boolean
