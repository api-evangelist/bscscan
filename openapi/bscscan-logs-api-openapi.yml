components:
  schemas:
    ResponseNOTOK:
      type: object
      properties:
        status:
          type: string
          enum:
          - '0'
        message:
          type: string
          pattern: ^NOTOK(-.*)?$
          examples:
          - NOTOK
          - NOTOK-Missing/Invalid API Key, rate limit of 1/5sec applied
        result:
          type: string
      required:
      - status
      - message
      - result
    IntegerMin1Max1000:
      type: integer
      format: int32
      minimum: 1
      maximum: 1000
    ResultArrayOfObjects:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/ArrayOfObjects'
    Topic:
      type: string
      enum:
      - topic0
      - topic1
      - topic2
      - topic3
    ResponseOK:
      type: object
      properties:
        status:
          type: string
          enum:
          - '1'
        message:
          type: string
          enum:
          - OK
        result:
          description: call result
      required:
      - status
      - message
      - result
    AddressHash:
      type: string
      pattern: 0x[A-Fa-f0-9]{40}
      example: '0x01234567890abcdef01234567890abcdef012345'
    TopicOperator:
      type: string
      enum:
      - and
      - or
    ArrayOfObjects:
      type: array
      items:
        type: object
        additionalProperties: true
    IntegerMin0:
      type: integer
      minimum: 0
    IntegerMin1:
      type: integer
      minimum: 1
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: query
      name: apikey
externalDocs:
  url: https://docs.bscscan.com/
