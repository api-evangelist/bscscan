        required: true
        example: '0x59728544b08ab483533076417fbbb2fd0b17ce3a'
      - in: query
        name: topic
        schema:
          $ref: '#/components/schemas/Topic'
        required: true
        example: ''
      - in: query
        name: topicOperator
        schema:
          $ref: '#/components/schemas/TopicOperator'
        required: false
        example: ''
      - in: query
        name: page
        schema:
          $ref: '#/components/schemas/IntegerMin1'
        required: false
        example: '1'
      - in: query
