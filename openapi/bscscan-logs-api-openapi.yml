                  transactionHash: '0x4ffd22d986913d33927a392fe4319bcd2b62f3afe1c15a2c59f77fc2cc4c20a9'
                  transactionIndex: 0x
  /?module=logs&action=getLogs&get-event-logs-by-address-filtered-by-topics:
